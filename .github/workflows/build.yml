name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-vsix:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run pack:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-them-vsix
          path: "*.vsix"

  build-node-package:
    name: Build Node Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Pack node package
        run: npm run pack:node-package

      - name: Upload node package artifact
        uses: actions/upload-artifact@v4
        with:
          name: markdown-them-node-package
          path: ./artifacts/*.tgz
